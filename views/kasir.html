<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir — KasirKu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-indigo-700 text-white shadow">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="/" class="font-bold text-lg">🧾 KasirKu</a>
    <div class="flex gap-6 text-sm font-medium">
      <a href="/" class="hover:text-indigo-200 transition">Dashboard</a>
      <a href="/products" class="hover:text-indigo-200 transition">Produk</a>
      <a href="/kasir" class="text-indigo-200 border-b-2 border-indigo-200 pb-0.5">Kasir</a>
      <a href="/transactions" class="hover:text-indigo-200 transition">Transaksi</a>
    </div>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-4 py-6" id="kasir-page">

  <!-- Error flash -->
  <div class="flash-error hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">
    Terjadi kesalahan.
  </div>

  <div class="grid grid-cols-12 gap-6">

    <!-- ===== PRODUCT GRID (left) ===== -->
    <div class="col-span-12 lg:col-span-7">
      <h2 class="font-semibold text-gray-700 mb-3 text-sm uppercase tracking-wide">Pilih Produk</h2>
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="product-grid">

        <!-- No products state -->
        <p class="no-products col-span-3 text-center text-gray-400 py-10 bg-white rounded-xl border border-dashed">
          Tidak ada produk tersedia. <a href="/products" class="text-indigo-600 underline">Tambah produk</a> dahulu.
        </p>

        <!-- Product card — fst_template will duplicate this per product -->
        <button class="product-btn text-left bg-white hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-xl p-4 transition group"
          data-id="1" data-name="Produk" data-price="10000" data-stock="10">
          <span class="btn-name block font-semibold text-gray-800 text-sm mb-1 leading-tight">Nama Produk</span>
          <span class="btn-price block text-indigo-600 font-bold text-sm">Rp 10.000</span>
          <span class="btn-stock block text-xs text-gray-400 mt-1">Stok: 10</span>
        </button>

      </div>
    </div>

    <!-- ===== CART (right) ===== -->
    <div class="col-span-12 lg:col-span-5">
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col h-full" style="min-height:500px">

        <!-- Cart header -->
        <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
          <h2 class="font-semibold text-gray-700">Keranjang</h2>
          <button id="btn-clear" onclick="clearCart()"
            class="text-xs text-red-400 hover:text-red-600 transition hidden">Kosongkan</button>
        </div>

        <!-- Cart items -->
        <div id="cart-container" class="flex-1 overflow-y-auto px-5 py-3">
          <p id="cart-empty-msg" class="text-center text-gray-400 text-sm py-8">
            Klik produk untuk menambahkan ke keranjang.
          </p>
        </div>

        <!-- Total -->
        <div class="px-5 py-3 border-t border-gray-100 bg-gray-50">
          <div class="flex justify-between items-center text-sm text-gray-600 mb-1">
            <span>Subtotal</span>
            <span id="cart-total" class="font-bold text-gray-900 text-base">Rp 0</span>
          </div>
        </div>

        <!-- Checkout form -->
        <form id="checkout-form" action="/kasir/checkout" method="POST" class="px-5 py-4 border-t border-gray-100">
          <!-- CSRF injected by fst_template -->
          <input type="hidden" name="cart_json" id="cart-json">

          <div class="mb-3">
            <label class="block text-xs font-medium text-gray-500 mb-1">Jumlah Bayar (Rp)</label>
            <input type="number" name="paid" id="paid-input" min="0" placeholder="0"
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 font-mono">
          </div>

          <div class="flex justify-between items-center mb-4 text-sm">
            <span class="text-gray-500">Kembalian</span>
            <span id="kembalian" class="font-bold text-green-600 text-base">Rp 0</span>
          </div>

          <button type="submit" id="btn-bayar" disabled
            class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 disabled:cursor-not-allowed
                   text-white font-semibold py-3 rounded-xl transition text-sm">
            Bayar Sekarang
          </button>
        </form>

      </div>
    </div>
  </div>
</div>

<script>
// ===== CART STATE =====
let cartItems = {};

function addToCart(id, name, price, stock) {
  id = String(id);
  if (cartItems[id]) {
    if (cartItems[id].qty >= cartItems[id].stock) {
      alert('Stok ' + name + ' sudah habis!');
      return;
    }
    cartItems[id].qty++;
  } else {
    cartItems[id] = { id, name, price: parseInt(price), qty: 1, stock: parseInt(stock) };
  }
  renderCart();
}

function removeFromCart(id) {
  delete cartItems[id];
  renderCart();
}

function updateQty(id, delta) {
  id = String(id);
  if (!cartItems[id]) return;
  const newQty = cartItems[id].qty + delta;
  if (newQty <= 0) { removeFromCart(id); return; }
  if (newQty > cartItems[id].stock) return;
  cartItems[id].qty = newQty;
  renderCart();
}

function clearCart() {
  cartItems = {};
  renderCart();
}

function getTotal() {
  return Object.values(cartItems).reduce((sum, i) => sum + i.price * i.qty, 0);
}

function formatRp(n) {
  return 'Rp ' + parseInt(n).toLocaleString('id-ID');
}

function renderCart() {
  const container   = document.getElementById('cart-container');
  const totalEl     = document.getElementById('cart-total');
  const emptyMsg    = document.getElementById('cart-empty-msg');
  const btnBayar    = document.getElementById('btn-bayar');
  const btnClear    = document.getElementById('btn-clear');
  const items       = Object.values(cartItems);

  if (items.length === 0) {
    container.innerHTML = '<p id="cart-empty-msg" class="text-center text-gray-400 text-sm py-8">Klik produk untuk menambahkan ke keranjang.</p>';
    totalEl.textContent = 'Rp 0';
    btnBayar.disabled = true;
    btnClear.classList.add('hidden');
    updateKembalian();
    return;
  }

  let html = '';
  items.forEach(item => {
    html += `
    <div class="flex items-start gap-3 py-3 border-b border-gray-100 last:border-0">
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-gray-800 truncate">${item.name}</p>
        <p class="text-xs text-gray-400">${formatRp(item.price)} / pcs</p>
      </div>
      <div class="flex items-center gap-1 shrink-0">
        <button onclick="updateQty('${item.id}',-1)"
          class="w-7 h-7 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-bold transition">−</button>
        <span class="w-8 text-center text-sm font-semibold">${item.qty}</span>
        <button onclick="updateQty('${item.id}',1)"
          class="w-7 h-7 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-bold transition">+</button>
      </div>
      <div class="w-20 text-right shrink-0">
        <p class="text-sm font-semibold text-gray-800">${formatRp(item.price * item.qty)}</p>
        <button onclick="removeFromCart('${item.id}')"
          class="text-xs text-red-400 hover:text-red-600 transition">hapus</button>
      </div>
    </div>`;
  });

  container.innerHTML = html;
  totalEl.textContent = formatRp(getTotal());
  btnBayar.disabled = false;
  btnClear.classList.remove('hidden');
  updateKembalian();
}

function updateKembalian() {
  const paid  = parseInt(document.getElementById('paid-input').value) || 0;
  const total = getTotal();
  const sisa  = paid - total;
  const el    = document.getElementById('kembalian');
  if (total === 0) { el.textContent = 'Rp 0'; el.className = 'font-bold text-green-600 text-base'; return; }
  el.textContent = sisa >= 0 ? formatRp(sisa) : '– ' + formatRp(Math.abs(sisa));
  el.className   = 'font-bold text-base ' + (sisa >= 0 ? 'text-green-600' : 'text-red-500');
}

// ===== INIT =====
document.querySelectorAll('.product-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    addToCart(btn.dataset.id, btn.dataset.name, btn.dataset.price, btn.dataset.stock);
  });
});

document.getElementById('paid-input').addEventListener('input', updateKembalian);

document.getElementById('checkout-form').addEventListener('submit', function(e) {
  const items = Object.values(cartItems);
  if (items.length === 0) { e.preventDefault(); return; }
  const paid  = parseInt(document.getElementById('paid-input').value) || 0;
  const total = getTotal();
  if (paid < total) {
    e.preventDefault();
    alert('Jumlah bayar (' + formatRp(paid) + ') kurang dari total (' + formatRp(total) + ').');
    return;
  }
  document.getElementById('cart-json').value = JSON.stringify(items);
});
</script>

</body>
</html>
