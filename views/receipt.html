<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Struk Transaksi — KasirKu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-indigo-700 text-white shadow no-print">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="/" class="font-bold text-lg">🧾 KasirKu</a>
    <div class="flex gap-6 text-sm font-medium">
      <a href="/" class="hover:text-indigo-200 transition">Dashboard</a>
      <a href="/products" class="hover:text-indigo-200 transition">Produk</a>
      <a href="/kasir" class="hover:text-indigo-200 transition">Kasir</a>
      <a href="/transactions" class="hover:text-indigo-200 transition">Transaksi</a>
    </div>
  </div>
</nav>

<div class="max-w-md mx-auto px-4 py-8">

  <!-- Receipt card -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden" id="receipt-card">

    <!-- Header -->
    <div class="bg-indigo-700 text-white text-center py-6 px-4">
      <p class="font-bold text-xl mb-1">KasirKu</p>
      <p class="text-indigo-200 text-xs">Struk Pembelian</p>
    </div>

    <div class="px-6 py-4">
      <!-- Transaction info -->
      <div class="flex justify-between text-sm text-gray-600 mb-1">
        <span>No. Transaksi</span>
        <span class="font-mono font-bold text-gray-800" data-fst="trx-id">#1</span>
      </div>
      <div class="flex justify-between text-sm text-gray-500 mb-4">
        <span>Tanggal</span>
        <span data-fst="trx-date">2026-01-01 00:00:00</span>
      </div>

      <!-- Divider -->
      <div class="border-t border-dashed border-gray-200 mb-4"></div>

      <!-- Items table -->
      <table class="w-full text-sm mb-4">
        <thead>
          <tr class="text-gray-400 text-xs">
            <th class="text-left pb-2 font-medium">Produk</th>
            <th class="text-center pb-2 font-medium w-10">Qty</th>
            <th class="text-right pb-2 font-medium">Harga</th>
            <th class="text-right pb-2 font-medium">Total</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr class="item-row">
            <td class="item-name py-2 text-gray-800 font-medium">Nama Produk</td>
            <td class="item-qty py-2 text-center text-gray-600">1</td>
            <td class="item-price py-2 text-right text-gray-600">Rp 10.000</td>
            <td class="item-subtotal py-2 text-right font-semibold text-gray-800">Rp 10.000</td>
          </tr>
        </tbody>
      </table>

      <!-- Divider -->
      <div class="border-t border-dashed border-gray-200 mb-4"></div>

      <!-- Summary -->
      <div class="space-y-2 text-sm">
        <div class="flex justify-between">
          <span class="text-gray-600">Total</span>
          <span class="font-bold text-gray-900 text-base" data-fst="trx-total">Rp 0</span>
        </div>
        <div class="flex justify-between text-gray-500">
          <span>Bayar</span>
          <span data-fst="trx-paid">Rp 0</span>
        </div>
        <div class="flex justify-between text-green-600 font-semibold border-t border-gray-100 pt-2">
          <span>Kembalian</span>
          <span data-fst="trx-change">Rp 0</span>
        </div>
      </div>

      <!-- Footer -->
      <div class="text-center mt-6 text-gray-400 text-xs">
        <p>Terima kasih telah berbelanja!</p>
      </div>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="flex gap-3 mt-5 no-print">
    <a href="/kasir"
      class="flex-1 text-center bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-3 rounded-xl text-sm font-semibold transition">
      Transaksi Baru
    </a>
    <button onclick="window.print()"
      class="flex-1 bg-white hover:bg-gray-50 border border-gray-200 text-gray-700 px-4 py-3 rounded-xl text-sm font-medium transition">
      🖨 Cetak Struk
    </button>
    <a href="/transactions"
      class="flex-1 text-center bg-white hover:bg-gray-50 border border-gray-200 text-gray-700 px-4 py-3 rounded-xl text-sm font-medium transition">
      Riwayat
    </a>
  </div>

</div>

</body>
</html>
